<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上Google表單抽獎轉盤</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
            padding: 20px;
        }
        .controls {
            margin: 15px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        select {
            padding: 8px 15px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        #wheel-container {
            position: relative;
            margin: 20px;
        }
        canvas {
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            background-color: white;
        }
        #pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ff4757;
            z-index: 10;
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            background-color: #2ed573;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        button:hover { background-color: #26af5f; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        #result {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            height: 30px;
        }
    </style>
</head>
<body>

    <h1>Google 表單連動抽獎轉盤</h1>
    
    <div class="controls">
        <label for="column-select">請選擇抽獎欄位：</label>
        <select id="column-select" onchange="switchColumn()">
            <option value="1">B 欄選項 (B2:B11)</option>
            <option value="2">C 欄選項 (C2:C11)</option>
        </select>
        <button id="spin-btn" onclick="spinWheel()" disabled>讀取資料中...</button>
    </div>
    
    <div id="wheel-container">
        <div id="pointer"></div>
        <canvas id="wheel" width="400" height="400"></canvas>
    </div>

    <div id="result"></div>

    <script>
        // 已自動帶入您提供的 Google 試算表 CSV 網址
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTTiOhVebcaxbl9tAumV4RswFvXEB2NgpYJoipVaDPxEkKUcMo1msZEnHGHmEdRDn_8btliimScGy-i/pub?gid=0&single=true&output=csv"; 

        let rawRows = []; // 儲存所有原始資料行
        let options = []; // 儲存當前轉盤的有效選項
        
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('spin-btn');
        const resultDiv = document.getElementById('result');
        const columnSelect = document.getElementById('column-select');
        
        let currentAngle = 0;
        let isSpinning = false;

        // 立即抓取資料
        fetchData();

        // 從 Google 試算表抓取資料
        async function fetchData() {
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                
                // 解析 CSV 將每一行切開，並用逗號分割成欄位
                rawRows = data.split('\n').map(row => row.split(','));
                
                // 抓取完畢後，預設載入 B 欄 (欄位索引 1)
                switchColumn();
            } catch (error) {
                console.error("資料抓取失敗:", error);
                resultDiv.innerText = "無法讀切 Google 表單資料，請檢查網路或網址。";
            }
        }

        // 切換欄位邏輯
        function switchColumn() {
            if (rawRows.length === 0) return;
            
            const colIndex = parseInt(columnSelect.value); // 1 代表 B 欄, 2 代表 C 欄
            options = [];

            // 限制讀取第 2 列到第 11 列 (程式索引為 1 到 10)
            for (let i = 1; i <= 10; i++) {
                if (rawRows[i] && rawRows[i][colIndex]) {
                    const value = rawRows[i][colIndex].trim();
                    // 只要不是空的，就塞進轉盤選項
                    if (value !== "") {
                        options.push(value);
                    }
                }
            }

            if (options.length === 0) {
                resultDiv.innerText = "該欄位目前沒有任何有效數據！";
                btn.disabled = true;
                // 畫一個空的白轉盤
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            } else {
                resultDiv.innerText = "";
                btn.disabled = false;
                btn.innerText = "開始抽獎！";
                initWheel();
            }
        }

        function initWheel() {
            drawWheel(0);
        }

        // 畫轉盤
        function drawWheel(currentAngle) {
            const numSegments = options.length;
            if (numSegments === 0) return;
            
            const segmentAngle = (2 * Math.PI) / numSegments;
            const colors = ['#ff4757', '#ffa502', '#2ed573', '#1e90ff', '#3742fa', '#9b59b6'];

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate(currentAngle);

            for (let i = 0; i < numSegments; i++) {
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, canvas.width / 2, i * segmentAngle, (i + 1) * segmentAngle);
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                ctx.stroke();

                // 寫文字
                ctx.save();
                ctx.fillStyle = 'white';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'right';
                ctx.rotate(i * segmentAngle + segmentAngle / 2);
                ctx.fillText(options[i], canvas.width / 2 - 20, 5);
                ctx.restore();
            }
            ctx.restore();
        }

        // 轉動轉盤
        function spinWheel() {
            if (isSpinning || options.length === 0) return;
            isSpinning = true;
            btn.disabled = true;
            columnSelect.disabled = true; // 旋轉時禁用切換
            resultDiv.innerText = "";

            const totalRotation = 2 * Math.PI * 5 + Math.random() * 2 * Math.PI; // 轉 5 圈 + 隨機角度
            const duration = 4000; // 轉動 4 秒
            const startTime = performance.now();

            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                if (elapsed < duration) {
                    const progress = elapsed / duration;
                    const easeOut = 1 - Math.pow(1 - progress, 3); // 減速效果
                    const angle = totalRotation * easeOut;
                    drawWheel(angle);
                    requestAnimationFrame(animate);
                } else {
                    const finalAngle = totalRotation % (2 * Math.PI);
                    drawWheel(finalAngle);
                    
                    const numSegments = options.length;
                    const segmentAngle = (2 * Math.PI) / numSegments;
                    
                    let targetAngle = (3 * Math.PI / 2 - finalAngle) % (2 * Math.PI);
                    if (targetAngle < 0) targetAngle += 2 * Math.PI;
                    
                    const winningIndex = Math.floor(targetAngle / segmentAngle) % numSegments;
                    
                    resultDiv.innerText = `🎉 恭喜中獎：${options[winningIndex]} !`;
                    isSpinning = false;
                    btn.disabled = false;
                    columnSelect.disabled = false; // 恢復切換功能
                }
            }
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
